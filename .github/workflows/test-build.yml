# Throwaway TEST-BUILD helper. Pushing to the working branch builds THIS BRANCH (Windows + macOS)
# and publishes it as a PRERELEASE GitHub release (tag `test-gateway-diagnostics`) so the UNMERGED
# gateway-diagnostics work can be tried on a real corporate machine. It is deliberately NOT the
# official release path: it never checks out `main`, it is marked prerelease (never "Latest"), it
# stamps a distinct `-test` version so artifacts aren't confused with the official 1.2.2, and it
# replaces its own release on each push. Needed because this session can't push a tag or dispatch
# release.yml directly (both 403). Actions are SHA-pinned to match the hardened main workflows.
# DELETE this file once the feature is merged + released through the normal flow.
name: test-build

on:
  push:
    branches:
      - claude/gallant-cray-8lie9i

permissions:
  contents: write

# A newer push supersedes an in-flight build (avoids two ~10-min builds racing to publish the
# same fixed-tag pre-release).
concurrency:
  group: test-build
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false # a macOS failure must not discard the Windows artifacts (and vice-versa)
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        # No `ref:` — build the pushed branch commit (the unmerged feature), NOT main.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Stamp a distinct test version (so files aren't mistaken for the official 1.2.2)
        shell: bash
        run: npm version "1.2.3-test.${{ github.run_number }}" --no-git-tag-version --allow-same-version
      - name: Build renderer/main bundle
        run: npm run build
      - name: Package the distributables (no publish — gathered in the publish job)
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml --publish never
      - name: Collect distributables (hyphenate spaced filenames)
        shell: bash
        run: |
          mkdir -p dist-out
          find release -maxdepth 1 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' \) \
            -print0 | while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            cp "$f" "dist-out/${base// /-}"
          done
          ls -la dist-out
      - name: Upload this platform's artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-${{ matrix.platform }}
          path: dist-out/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download both platforms' artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Publish a PRERELEASE test build (never Latest, never main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The publish job skips checkout (it only needs the built artifacts), so gh has no git
          # remote to infer the repo from — point it explicitly or `gh release` fails.
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          tag="test-gateway-diagnostics"
          mkdir -p upload
          find artifacts -type f -exec cp {} upload/ \;
          echo "Assets:"
          ls -1 upload
          # Replace any previous test build so there is exactly one, pointing at this commit.
          gh release delete "$tag" --yes --cleanup-tag || true
          gh release create "$tag" upload/* \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "MeetingSpace — gateway diagnostics TEST build" \
            --notes "Unofficial TEST build from branch claude/gallant-cray-8lie9i (commit ${GITHUB_SHA}). Includes Settings ▸ Gateway models (diagnostics + curated picker) and the response-model badge fix. NOT an official release — do not treat as Latest. Windows: MeetingSpace-*-win.zip (portable, no install) or the Setup .exe. macOS: the .dmg / .zip matching your chip. Unsigned — first launch needs the one-time SmartScreen (Windows) / Gatekeeper (macOS) bypass."
          echo "Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"
