name: ci

# Runs the full quality-gate set (typecheck, lint, format, build, unit/component
# tests, coverage, security, e2e) on every push and pull request — the same set
# enforced locally. No gate is omitted; no --no-verify.

on:
  push:
  pull_request:

jobs:
  gates:
    # Node-ABI-at-rest job (ADR-0003): npm ci leaves better-sqlite3 at the Node
    # ABI, so the unit/coverage/storage gates pass without an Electron rebuild.
    runs-on: ubuntu-latest
    # gitleaks-action GETs /pulls/{n}/commits (pull-requests) and may comment on a
    # leak; the default GITHUB_TOKEN is contents:read-only, so PR scans 403 without
    # this. Scoped to this job so the e2e job's token is unaffected.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history for the gitleaks secret scan
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Key-never-plaintext (security)
        run: npm run test:security
      - name: Coverage (workspace ≥80%)
        run: npm run coverage
      - name: Coverage (safety primitives ≥95%)
        run: npm run coverage:primitives
      - name: Dependency audit (production deps)
        run: npm run audit
      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # gitleaks-action@v2 requires GITHUB_TOKEN to scan pull_request events
          # (it calls the GitHub API to read PR commits / comment). Push events run
          # without it, which is why this gate only tripped on PR #2. The auto-
          # provisioned token suffices — no GITLEAKS_LICENSE (user-account repo).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    # Electron-ABI job on the primary target (Windows). Playwright-on-Electron is
    # reliable on windows-latest; ubuntu-latest needs xvfb and hits launch bugs
    # (web-verified M02.A — playwright#12139 / #30154). npm run e2e rebuilds
    # better-sqlite3 for Electron, builds, then runs Playwright.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: E2E (Playwright-on-Electron + visual regression)
        run: npm run e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
