# Build the desktop app for Windows + macOS and publish the installers to a GitHub Release.
#
# Trigger: push a version tag (e.g. `git tag v1.1.0 && git push origin v1.1.0`), or run manually
# from the Actions tab (workflow_dispatch). Each OS builds on its own native runner — the only way
# to produce a macOS `.app` (electron-builder can't cross-build it) and it sidesteps the Windows
# symlink-privilege issue that blocks NSIS on an unprivileged local machine.
#
# Output (attached to the Release named after the tag):
#   Windows — `MeetingSpace Setup <ver>.exe` (NSIS installer) + a portable `.zip`
#   macOS   — `MeetingSpace-<ver>.dmg` + a `.zip`
# All UNSIGNED (no paid certs): first launch needs the one-time SmartScreen "More info → Run anyway"
# (Windows) / right-click → Open (macOS). See INSTALL-WINDOWS.md / INSTALL-MACOS.md.
#
# Hardening (audit finding H-3): the `uses:` actions below are pinned to full commit SHAs (the
# version rides in a trailing comment); Dependabot (.github/dependabot.yml) bumps the SHA + comment
# on each new release, so the pins never go stale.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create/update the GitHub Release

jobs:
  release:
    strategy:
      fail-fast: false # a macOS failure must not abort the Windows artifacts (and vice-versa)
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer/main bundle
        run: npm run build

      - name: Package & publish to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # electron-builder reads this to upload assets
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml --publish always

  # After both platforms have populated the (draft) release, set its body to the curated download
  # guidance + changelog. RELEASE_NOTES.md carries __VERSION__ placeholders filled from the
  # package.json version (the same version electron-builder tags the release with), so the file
  # stays correct for every release. electron-builder creates the GitHub release as a DRAFT, so this
  # edits the body before you review and publish it.
  notes:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Attach the curated release notes (download guidance + changelog)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ver="$(jq -r .version package.json)"
          sed "s/__VERSION__/${ver}/g" RELEASE_NOTES.md > notes.rendered.md
          gh release edit "v${ver}" --notes-file notes.rendered.md
