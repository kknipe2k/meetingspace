# One-shot helper to cut the v1.2.2 release from a phone-only flow: pushing this file to the working
# branch triggers a build of `main` (Windows + macOS) and publishes it as a PUBLISHED, "Latest"
# GitHub release with the curated RELEASE_NOTES.md body. Needed because this session can't push a
# version tag or dispatch release.yml directly (both return 403). It builds from `main` (not this
# trigger branch) so the version tag lands on main, and reads the version from package.json. Actions
# are SHA-pinned to match the hardened main workflows. THROWAWAY — delete once the release is live.
name: release-now

on:
  push:
    branches:
      - claude/gallant-cray-8lie9i

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false # a macOS failure must not discard the Windows artifacts (and vice-versa)
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main # build the released version from main, not this trigger branch
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build renderer/main bundle
        run: npm run build
      - name: Package the distributables (no publish — gathered in the publish job)
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml --publish never
      - name: Collect distributables (hyphenate spaced filenames to match the notes)
        shell: bash
        run: |
          mkdir -p dist-out
          find release -maxdepth 1 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' \) \
            -print0 | while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            cp "$f" "dist-out/${base// /-}"
          done
          ls -la dist-out
      - name: Upload this platform's artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-${{ matrix.platform }}
          path: dist-out/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
      - name: Download both platforms' artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Publish as the Latest release with curated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ver="$(jq -r .version package.json)"
          mkdir -p upload
          find artifacts -type f -exec cp {} upload/ \;
          sed "s/__VERSION__/${ver}/g" RELEASE_NOTES.md > notes.rendered.md
          echo "Publishing v${ver} with assets:"
          ls -1 upload
          gh release create "v${ver}" upload/* \
            --target main \
            --latest \
            --title "MeetingSpace v${ver}" \
            --notes-file notes.rendered.md
          echo "Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${ver}"
